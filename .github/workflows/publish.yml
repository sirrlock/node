name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RUN_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Set version
        run: |
          VER="1.0.${RUN_NUMBER}"
          npm version "$VER" --no-git-tag-version
          echo "VERSION=$VER" >> "$GITHUB_ENV"

      # ── @sirr/node (SDK + CLI) ──────────────────────────────────────────────

      - name: Check if @sirr/node version already published
        id: node-check
        run: |
          if npm view "@sirr/node@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @sirr/node
        if: steps.node-check.outputs.skip == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── sirr (bundled CLI, unscoped) ─────────────────────────────────────────

      - name: Check if sirr version already published
        id: sirr-check
        run: |
          if npm view "sirr@${VERSION}" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle CLI for sirr package
        if: steps.sirr-check.outputs.skip == 'false'
        run: |
          mkdir -p sirr-pkg
          ./node_modules/.bin/esbuild src/cli.ts \
            --bundle --platform=node --target=node18 \
            --banner:js='#!/usr/bin/env node' \
            --outfile=sirr-pkg/cli.js
          cat > sirr-pkg/package.json << EOF
          {
            "name": "sirr",
            "version": "${VERSION}",
            "description": "Sirr ephemeral secret vault — CLI (npx sirr push KEY=value)",
            "license": "MIT",
            "bin": { "sirr": "./cli.js" },
            "engines": { "node": ">=18" },
            "keywords": ["sirr", "secrets", "ephemeral", "vault", "cli", "ai-agents", "mcp"],
            "homepage": "https://sirr.dev",
            "repository": { "type": "git", "url": "https://github.com/SirrVault/node" }
          }
          EOF

      - name: Publish sirr
        if: steps.sirr-check.outputs.skip == 'false'
        run: npm publish --access public
        working-directory: sirr-pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
